name: fitness_tracker
description: A new Flutter project for fitness tracking.
publish_to: 'none'
version: 1.0.0+22

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.20.2
  fl_chart: ^1.2.0
  image_picker: ^1.0.7
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  http: ^1.2.1
  uuid: ^4.3.3
  flutter_secure_storage: ^10.0.0
  cupertino_icons: ^1.0.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  health: ^13.3.1
  flutter_local_notifications: ^21.0.0
  share_plus: ^12.0.2
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  flutter_markdown: ^0.7.7
  lottie: ^3.3.1
  in_app_purchase: ^3.2.0
  cloud_functions: ^6.2.0
  firebase_storage: ^13.1.0
  package_info_plus: ^8.3.0
  open_filex: ^4.7.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  flutter_facebook_auth: ^7.0.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.8

flutter:
  config:
    # health 等が SPM 非対応。Firebase の SPM キャッシュ競合も避けるため CocoaPods のみ使用
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/splash/
    - assets/lottie/exercises/
